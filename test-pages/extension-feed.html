<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Lazy Scroll Extension Feed</title>
    <style>
      html, body { margin: 0; min-height: 100%; font-family: system-ui, sans-serif; }
      main { height: 240vh; background: linear-gradient(#111827, #0f766e, #f97316); color: white; }
      section { height: 100vh; display: grid; place-items: center; font-size: 44px; }
      video {
        position: fixed;
        left: 24px;
        bottom: 24px;
        width: 320px;
        height: 180px;
        background: #030712;
      }
    </style>
  </head>
  <body>
    <video muted playsinline></video>
    <main>
      <section>Extension Reel 1</section>
      <section>Extension Reel 2</section>
    </main>
  </body>
</html>
